<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armagedon Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Images/rocket.png" type="image/png">
</head>
<body>

    <main class="principal">
        <div id="botao-tema" onclick="dark()" class="icone-tema">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-moon-fill lua" viewBox="0 0 16 16">
                <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/>
            </svg>

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-sun-fill sol" viewBox="0 0 16 16">
                <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
            </svg>
        </div>


        
        <div class="cabecalho-logo">
            <h1>Armagedon Tracker</h1>
        </div>
        <div id="widget-clima" class="clima-container">
            <div class="clima-info">
                <span id="clima-cidade">Carregando clima...</span>
                <div class="clima-detalhes">
                    <span id="clima-temp">--°C</span>
                    <span id="clima-desc">--</span>
                </div>
            </div>
            <div id="clima-status-obs" class="status-obs">
                Verificando visibilidade...
            </div>
        </div>
        <div class="principal-buscar">
            <input type="number" id="id_asteroid" placeholder="Digite o ID">
            <input type="button" value="Enviar" onclick="mostrarAsteroid()" id="botao">
            <input type="button" value="Perigosos Hoje" onclick="buscarPerigososHoje()" id="botao-alerta">
        </div>

        <div class="principal-asteroid"></div>   
        
        <a href="sbdb_query_results.csv" download id="ids">Baixe os IDs dos Asteroids</a>
    </main>
    
    <section class="rodape">
        <div class="mapa">
            <iframe src="https://eyes.nasa.gov/apps/asteroids/" id="meu-iframe-nasa" width="100%" height="500px" frameborder="0"></iframe>
        </div>
    </section>
    
    <script src="script.js"></script>
    <script src="darkmode.js"></script>
    <script defer src="https://cloud.umami.is/script.js" 
        data-website-id="21deef4c-e1b8-44f9-8723-71a313ac66bd"></script>
</body>
</html>
